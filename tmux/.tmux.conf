# .tmux.conf — minimalist (Aura Dark)
# ─────────────────────────────────────────────
# Aura Dark palette:
#   bg:      #15141b   fg:      #edecee
#   purple:  #a277ff   green:   #61ffca
#   gray:    #6d6d6d

# Reload
unbind r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Prefix
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# Core
set -g mouse on
set -g escape-time 0
set -g history-limit 1000000
set -g renumber-windows on
set -g set-clipboard on
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
set -g focus-events on
set -g display-time 2000
set -g detach-on-destroy off
setw -g mode-keys vi

# Indexing
set -g base-index 1
setw -g pane-base-index 1

# Pane navigation (hjkl)
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Window navigation (no prefix)
bind -n M-h previous-window
bind -n M-l next-window

# Splits (open in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Copy mode (vi)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Pane borders
set -g pane-active-border-style 'fg=#a277ff'
set -g pane-border-style 'fg=#6d6d6d'

# Status bar
set -g status-position bottom
set -g status-style 'fg=#edecee,bg=#15141b'

set -g status-left ' #S '
set -g status-left-style 'fg=#15141b,bg=#a277ff,bold'
set -g status-left-length 30

set -g status-right ' #{pane_current_path} '
set -g status-right-style 'fg=#6d6d6d,bg=#15141b'
set -g status-right-length 80

set -g window-status-format ' #I:#W '
set -g window-status-style 'fg=#6d6d6d,bg=#15141b'

set -g window-status-current-format ' #I:#W '
set -g window-status-current-style 'fg=#61ffca,bg=#15141b,bold'

set -g window-status-separator ''

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

run '~/.tmux/plugins/tpm/tpm'
